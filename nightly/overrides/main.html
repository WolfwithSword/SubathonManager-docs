{% extends "base.html" %}

{% block extrahead %}
  {% if page %}
  <meta property="og:title" content="{{ page.title }} - {{ config.site_name }}" />
  <meta property="og:description" content="[{{config.extra.docs_version}}] {{ page.meta.description | default(config.site_description) }}" />
  <meta property="og:image" content="https://raw.githubusercontent.com/WolfwithSword/SubathonManager/refs/heads/main/assets/icon.png" />
  <meta property="og:url" content="{{ page.canonical_url }}" />
  <meta name="twitter:card" content="summary" />
  {% endif %}
{% endblock %}
