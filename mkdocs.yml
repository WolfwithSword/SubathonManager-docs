site_name: Subathon Manager
site_url: https://docs.subathonmanager.app
site_author: WolfwithSword
site_description: Documentation for SubathonManager
repo_name: WolfwithSword/SubathonManager
repo_url: https://github.com/WolfwithSword/SubathonManager
edit_uri: ""

docs_dir: wiki

theme:
  name: material
  logo: assets/icon.png
  favicon: assets/icon.png

  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.instant
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - announce.dismiss

  icon:
    repo: fontawesome/brands/github

extra:
  version:
    provider: mike
    default: nightly
  docs_version: !ENV [DOCS_VERSION, "latest"] #ignore error
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/WolfwithSword/SubathonManager
    - icon: fontawesome/brands/discord
      link: https://discord.gg/r8FUvUdCpP
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/_WolfwithSword
    - icon: fontawesome/brands/twitch
      link: https://www.twitch.tv/wolfwithsword

extra_css:
  - assets/extra.css

extra_javascript:
  - https://viewer.diagrams.net/js/viewer-static.min.js
  - assets/javascripts/drawio-reload.js

plugins:
  - search
  - macros
  - glightbox
  - awesome-nav
  - drawio:
      tooltips: true 
      border: 5
      darkmode: true
      edit: false
      highlight: "#0000FF"
      lightbox: true
      toolbar:
        pages: true
        tags: true
        zoom: true
        layers: true
        lightbox: true
        position: "top"
        no_hide: true
        show_title: false
  - mike:
      alias_type: symlink
      redirect_template: null
      deploy_prefix: ''
      canonical_version: latest
      version_selector: true
      css_dir: assets
      javascript_dir: assets

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji: # ignore errors
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: On this page
